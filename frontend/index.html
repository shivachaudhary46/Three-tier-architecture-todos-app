<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up</title>
    <link rel="stylesheet" href="./css/signup.css">
</head>

<body>

    <div class="container">
        <h2>Create Account</h2>

        <form id="signupform" autocomplete="off">
            <label for="username">Username</label>
            <input type="text" id="username" placeholder="Enter your username" autocomplete="off" required>

            <label for="email">Email</label>
            <input type="email" id="email" placeholder="Enter your email" autocomplete="off" required>

            <label for="password">Password</label>
            <input type="password" id="password" placeholder="Enter your password" autocomplete="off" required>

            <button type="submit" id="signupbutton">Sign Up</button>

            <p class="login-link">
                Already have an account?
                <a href="login.html">Login</a>
            </p>
        </form>
    </div>

    <script type="module" src="./js/signup.js"></script>

</body>

</html>
